{% extends "base.html" %}
{% block naslov %}Prijava — javna-narocila.si{% endblock %}

{% block vsebina %}
<section>
<div class="ovoj ozko">
    <h1>Prijava</h1>
    <p class="vodilo">Vpišite svoj email — poslali vam bomo povezavo za prijavo. Brez gesla.</p>

    {% if napaka %}<div class="opozorilo" style="margin-top:24px;">{{ napaka }}</div>{% endif %}

    <form method="post" action="/prijava" style="margin-top:28px;">
        <div class="polje">
            <label for="email">Email</label>
            <input type="email" name="email" id="email" placeholder="ime@podjetje.si" required>
        </div>
        <button type="submit" class="gumb">Pošlji prijavno povezavo</button>
    </form>

    <p class="drobno" style="margin-top:16px;">Še nimate računa? <a href="/registracija">Registracija</a>.</p>
</div>
</section>
{% endblock %}

{% extends "base.html" %}
{% block naslov %}Odjava — Lovec{% endblock %}

{% block vsebina %}
<section>
<div class="ovoj">
    <div class="kartica sredina ozko" style="margin:0 auto;">
        <h1 style="font-size:30px;">Uspešno odjavljeni</h1>
        {% if email %}
        <p class="vodilo" style="margin:0 auto;">
            Naslov <strong>{{ email }}</strong> ne bo več prejemal obvestil Lovca. Žal nam je, da odhajate.
        </p>
        {% else %}
        <p class="vodilo" style="margin:0 auto;">Odjava je zaključena.</p>
        {% endif %}
        <p style="margin-top:24px;"><a href="/" class="gumb obroba">Nazaj na domačo stran</a></p>
    </div>
</div>
</section>
{% endblock %}

<!DOCTYPE html>
<html lang="sl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block naslov %}Lovec — alerti o javnih naročilih{% endblock %}</title>
    <meta name="description" content="Nikoli več zamujenega razpisa. Lovec vsak dan spremlja javna naročila na ejn.gov.si in vam pošlje le tista, ki ustrezajo vaši dejavnosti.">
    <style>
        :root {
            --brand:      #2563eb;
            --brand-dark: #1d4ed8;
            --brand-700:  #1e40af;
            --ink:        #0f172a;
            --ink-2:      #334155;
            --muted:      #64748b;
            --line:       #e2e8f0;
            --line-2:     #eef2f7;
            --soft:       #f8fafc;
            --soft-blue:  #eff4ff;
            --ok:         #16a34a;
            --rok:        #dc2626;
            --radij:      14px;
            --radij-s:    10px;
            --senca:      0 1px 2px rgba(15,23,42,.04), 0 8px 24px rgba(15,23,42,.06);
            --senca-mehka:0 1px 3px rgba(15,23,42,.05);
            --maks:       1080px;
        }
        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; color: var(--ink); line-height: 1.6; background: #fff;
            -webkit-font-smoothing: antialiased;
        }
        a { color: var(--brand-dark); text-decoration: none; }
        a:hover { text-decoration: underline; }
        .ovoj { max-width: var(--maks); margin: 0 auto; padding: 0 24px; }

        /* ---- Header ---- */
        header {
            border-bottom: 1px solid var(--line); background: rgba(255,255,255,.85);
            backdrop-filter: saturate(180%) blur(8px); position: sticky; top: 0; z-index: 20;
        }
        header .ovoj { display: flex; align-items: center; justify-content: space-between; height: 66px; }
        .logo { display: inline-flex; align-items: center; gap: 9px; font-weight: 800; font-size: 19px; color: var(--ink); }
        .logo:hover { text-decoration: none; }
        .logo .mark {
            width: 30px; height: 30px; border-radius: 8px;
            background: linear-gradient(135deg, var(--brand), var(--brand-700));
            display: inline-flex; align-items: center; justify-content: center;
        }
        nav { display: flex; align-items: center; gap: 8px; }
        nav a.tekst { color: var(--ink-2); font-weight: 600; font-size: 15px; padding: 8px 12px; border-radius: 8px; }
        nav a.tekst:hover { background: var(--soft); text-decoration: none; }

        /* ---- Gumbi ---- */
        .gumb {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: var(--brand); color: #fff; padding: 12px 22px; border-radius: var(--radij-s);
            font-weight: 700; font-size: 16px; border: 1px solid var(--brand); cursor: pointer;
            transition: background .15s, transform .05s, box-shadow .15s; line-height: 1.2;
        }
        .gumb:hover { background: var(--brand-dark); border-color: var(--brand-dark); text-decoration: none; box-shadow: 0 6px 18px rgba(37,99,235,.28); }
        .gumb:active { transform: translateY(1px); }
        .gumb.obroba { background: #fff; color: var(--brand-dark); border-color: var(--line); box-shadow: none; }
        .gumb.obroba:hover { background: var(--soft); border-color: #cdd7e6; box-shadow: none; }
        .gumb.mini { padding: 9px 16px; font-size: 15px; }
        .gumb.poln { width: 100%; }

        /* ---- Tipografija / sekcije ---- */
        main section { padding: 64px 0; }
        h1 { font-size: clamp(34px, 5vw, 52px); line-height: 1.08; letter-spacing: -.02em; margin: 0 0 18px; }
        h2 { font-size: clamp(26px, 3.4vw, 34px); line-height: 1.15; letter-spacing: -.015em; margin: 0 0 14px; }
        h3 { font-size: 19px; margin: 0 0 6px; }
        .vodilo { font-size: 19px; color: var(--muted); max-width: 620px; margin: 0; }
        .sekcija-glava { max-width: 660px; margin-bottom: 36px; }
        .znacka {
            display: inline-flex; align-items: center; gap: 7px; background: var(--soft-blue);
            color: var(--brand-700); font-weight: 700; font-size: 13px; padding: 6px 13px;
            border-radius: 999px; margin-bottom: 18px;
        }
        .sredina { text-align: center; }
        .sredina .vodilo, .sekcija-glava.sredina { margin-left: auto; margin-right: auto; }
        .drobno { font-size: 14px; color: var(--muted); }
        .soft-bg { background: var(--soft); }

        /* ---- Hero ---- */
        .hero { padding-top: 72px; padding-bottom: 64px; }
        .hero-grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 48px; align-items: center; }
        .hero .cta-vrsta { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
        .hero .mikro { margin-top: 14px; }
        .pike { display: inline-flex; gap: 10px; flex-wrap: wrap; color: var(--muted); font-size: 14px; }
        .pike span { display: inline-flex; align-items: center; gap: 6px; }

        /* ---- Email mockup (hero + sekcija) ---- */
        .okno {
            background: #fff; border: 1px solid var(--line); border-radius: var(--radij);
            box-shadow: var(--senca); overflow: hidden;
        }
        .okno-vrh { display: flex; align-items: center; gap: 7px; padding: 12px 14px; background: var(--soft); border-bottom: 1px solid var(--line); }
        .okno-vrh i { width: 11px; height: 11px; border-radius: 50%; background: #d6deea; display: inline-block; }
        .okno-vrh .naslov { margin-left: 10px; font-size: 13px; color: var(--muted); font-weight: 600; }
        .mail-glava { padding: 16px 18px 8px; }
        .mail-zadeva { font-weight: 700; font-size: 16px; }
        .mail-od { font-size: 13px; color: var(--muted); margin-top: 2px; }
        .mail-vrstica { padding: 13px 18px; border-top: 1px solid var(--line-2); }
        .mail-vrstica .n { font-weight: 600; }
        .mail-vrstica .o { font-size: 13px; color: var(--muted); }
        .mail-vrstica .r { font-size: 13px; margin-top: 2px; }
        .mail-vrstica .r b { color: var(--rok); }

        /* ---- Koraki / kartice ---- */
        .mreza-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
        .karta {
            background: #fff; border: 1px solid var(--line); border-radius: var(--radij);
            padding: 26px; box-shadow: var(--senca-mehka);
        }
        .karta .ikona {
            width: 46px; height: 46px; border-radius: 11px; background: var(--soft-blue);
            color: var(--brand); display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px;
        }
        .korak-num {
            position: absolute; top: 18px; right: 22px; font-size: 13px; font-weight: 800; color: var(--brand);
            background: var(--soft-blue); width: 26px; height: 26px; border-radius: 50%;
            display: inline-flex; align-items: center; justify-content: center;
        }
        .karta.korak { position: relative; }

        /* ---- Primer ujemanja ---- */
        .primer { display: grid; grid-template-columns: 1fr auto 1fr; gap: 22px; align-items: center; }
        .primer .pusica { color: var(--brand); display: flex; align-items: center; justify-content: center; }
        .znak-vrsta { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
        .znak { background: var(--soft-blue); color: var(--brand-700); border-radius: 999px; padding: 6px 12px; font-size: 13px; font-weight: 600; }
        .seznam-razpisov { list-style: none; padding: 0; margin: 12px 0 0; }
        .seznam-razpisov li { padding: 10px 0 10px 26px; position: relative; border-top: 1px solid var(--line-2); }
        .seznam-razpisov li:first-child { border-top: none; }
        .seznam-razpisov li:before { content: "✓"; position: absolute; left: 0; color: var(--ok); font-weight: 800; }

        /* ---- Cenik ---- */
        .paketi { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; align-items: stretch; }
        .paket {
            background: #fff; border: 1px solid var(--line); border-radius: var(--radij);
            padding: 30px 26px; display: flex; flex-direction: column; box-shadow: var(--senca-mehka);
        }
        .paket.izpostavljen { border: 2px solid var(--brand); box-shadow: 0 12px 40px rgba(37,99,235,.14); transform: translateY(-6px); }
        .paket .top-znacka { align-self: flex-start; background: var(--brand); color: #fff; font-size: 12px; font-weight: 700; padding: 5px 12px; border-radius: 999px; margin-bottom: 14px; }
        .paket h3 { font-size: 20px; }
        .cena { font-size: 38px; font-weight: 800; letter-spacing: -.02em; margin-top: 4px; }
        .cena small { font-size: 16px; font-weight: 500; color: var(--muted); }
        .paket .frek { color: var(--muted); font-size: 14px; margin: 6px 0 2px; }
        .paket ul { list-style: none; padding: 0; margin: 18px 0 26px; }
        .paket li { padding: 7px 0 7px 28px; position: relative; }
        .paket li:before { content: "✓"; position: absolute; left: 0; color: var(--ok); font-weight: 800; }
        .paket .gumb { margin-top: auto; }

        /* ---- FAQ ---- */
        .faq { max-width: 760px; }
        details.qa { border: 1px solid var(--line); border-radius: var(--radij-s); padding: 0; margin-bottom: 12px; background: #fff; }
        details.qa summary {
            cursor: pointer; padding: 18px 20px; font-weight: 650; font-size: 17px; list-style: none;
            display: flex; justify-content: space-between; align-items: center; gap: 16px;
        }
        details.qa summary::-webkit-details-marker { display: none; }
        details.qa summary:after { content: "+"; color: var(--brand); font-size: 22px; font-weight: 400; line-height: 1; }
        details.qa[open] summary:after { content: "–"; }
        details.qa .odg { padding: 0 20px 18px; color: var(--ink-2); }

        /* ---- Zaupanje ---- */
        .pas-zaupanja { background: var(--soft); border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
        .izjave { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; margin-top: 8px; }
        .izjava { background: #fff; border: 1px dashed var(--line); border-radius: var(--radij); padding: 22px; color: var(--muted); }

        /* ---- CTA pas ---- */
        .cta-pas {
            background: linear-gradient(135deg, var(--brand-700), var(--brand)); color: #fff;
            border-radius: 20px; padding: 48px 40px; text-align: center;
        }
        .cta-pas h2 { color: #fff; }
        .cta-pas .vodilo { color: #dbe6ff; margin: 0 auto 24px; }
        .cta-pas .gumb { background: #fff; color: var(--brand-700); border-color: #fff; }
        .cta-pas .gumb:hover { background: #eef2ff; border-color: #eef2ff; }

        /* ---- Obrazci ---- */
        form .polje { margin-bottom: 22px; }
        label { display: block; font-weight: 650; margin-bottom: 7px; }
        input[type=email], input[type=text], select, textarea {
            width: 100%; padding: 13px 14px; border: 1px solid var(--line); border-radius: var(--radij-s);
            font-size: 16px; font-family: inherit; color: var(--ink); background: #fff;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(37,99,235,.15); }
        textarea { min-height: 96px; resize: vertical; }
        .chipi { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 4px; }
        .chip {
            display: inline-flex; align-items: center; gap: 7px; padding: 9px 13px; border: 1px solid var(--line);
            border-radius: 999px; cursor: pointer; font-size: 14px; user-select: none; background: #fff; transition: all .12s;
        }
        .chip:hover { border-color: #cdd7e6; background: var(--soft); }
        .chip input { margin: 0; accent-color: var(--brand); }
        .chip:has(input:checked) { border-color: var(--brand); background: var(--soft-blue); color: var(--brand-700); font-weight: 650; }
        .opozorilo { background: #fef2f2; color: var(--rok); padding: 13px 16px; border-radius: var(--radij-s); margin-bottom: 22px; border: 1px solid #fecaca; }
        .obvestilo { background: #f0fdf4; color: #15803d; padding: 16px; border-radius: var(--radij-s); }
        .kartica { background: #fff; border: 1px solid var(--line); border-radius: var(--radij); padding: 32px; box-shadow: var(--senca-mehka); }
        .ozko { max-width: 680px; }

        /* ---- Footer ---- */
        footer { border-top: 1px solid var(--line); padding: 40px 0; color: var(--muted); font-size: 14px; margin-top: 24px; }
        footer .povezave { display: flex; flex-wrap: wrap; gap: 18px; margin-bottom: 14px; }
        footer .povezave a { color: var(--ink-2); font-weight: 600; }

        @media (max-width: 860px) {
            main section { padding: 48px 0; }
            .hero-grid { grid-template-columns: 1fr; gap: 32px; }
            .mreza-3, .paketi, .izjave { grid-template-columns: 1fr; }
            .primer { grid-template-columns: 1fr; }
            .primer .pusica { transform: rotate(90deg); }
            .paket.izpostavljen { transform: none; }
            nav a.tekst { display: none; }
            .cta-pas { padding: 36px 24px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="ovoj">
            <a href="/" class="logo">
                <span class="mark">
                    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.5" y2="16.5"></line></svg>
                </span>
                Lovec
            </a>
            <nav>
                <a href="/#kako" class="tekst">Kako deluje</a>
                <a href="/#cenik" class="tekst">Cenik</a>
                <a href="/pregled" class="tekst">Brezplačni pregled</a>
                <a href="/registracija" class="gumb mini">Začni</a>
            </nav>
        </div>
    </header>
    <main>
        {% block vsebina %}{% endblock %}
    </main>
    <footer>
        <div class="ovoj">
            <div class="povezave">
                <a href="/">Domov</a>
                <a href="/pregled">Brezplačni pregled</a>
                <a href="/registracija">Registracija</a>
                <a href="/zasebnost">Zasebnost</a>
            </div>
            <p class="drobno" style="margin:0;">© Lovec — alerti o javnih naročilih. Neodvisna storitev; podatki z uradnega portala ejn.gov.si.</p>
        </div>
    </footer>
</body>
</html>
